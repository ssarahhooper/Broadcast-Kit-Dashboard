databases:
  - name: kit-dashboard-db
    plan: free
    databaseName: kit_dashboard
    user: kit_dashboard

services:
  - type: web
    plan: free
    name: kit-dashboard
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn kit_dashboard.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kit-dashboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"