databases:
  - name: kit_dashboard
    plan: free
    databaseName: kit_dashboard
    user: kit_dashboard

services:
  - type: web
    plan: free
    name: kit_dashboard
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn mysite.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kit_dashboard
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4